[platformio]
default_envs = waveshare_esp32s3_usb_msc

[env]
platform = espressif32@6.3.2
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
extra_scripts = pre:tools/pio_set_version.py
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DRSVP_ON_DEVICE_EPUB_CONVERSION=1
build_src_filter =
  +<*>
  -<NativeCompanionPreview.cpp>

[env:waveshare_esp32s3]
build_flags =
  ${env.build_flags}
  -DRSVP_USB_TRANSFER_ENABLED=0

[env:waveshare_esp32s3_usb_msc]
build_flags =
  ${env.build_flags}
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_MSC_ON_BOOT=0
  -DRSVP_USB_TRANSFER_ENABLED=1
  -DRSVP_BOOKWORM_DEV=1
build_unflags =
  -DARDUINO_USB_MODE=1

[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = test_pacing
test_build_src = yes
build_src_filter = -<*> +<reader/ReadingLoop.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc

[env:native_companion_preview]
platform = native
framework =
build_src_filter =
  +<NativeCompanionPreview.cpp>
  +<bookworm/BookWormCreatureDraw.cpp>
build_flags =
  -std=c++17
  -Isrc
  -Itest/support

[env:native_bookworm_test]
platform = native
framework =
test_framework = unity
test_filter = test_bookworm
test_build_src = yes
; Exclude BookWormStore (Arduino Preferences) — tests only need hatch/sim/state.
build_src_filter =
  -<*>
  +<bookworm/BookWormHatch.cpp>
  +<bookworm/BookWormSim.cpp>
  +<bookworm/BookWormState.cpp>
build_flags =
  -std=c++17
  -Itest/support
  -Isrc

